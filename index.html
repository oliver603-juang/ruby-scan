<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>魔方色塊掃描器</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+TC:wght@400;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e12;--surface:#18181f;--surface2:#22222c;--border:#2a2a38;
  --text:#e4e4ef;--text2:#8888a0;--accent:#5cf;--accent2:#f85;
  --red:#e33;--green:#3b5;--blue:#48f;--orange:#f83;--yellow:#fd2;--white:#eee;
  --font-mono:'JetBrains Mono',monospace;--font-ui:'Noto Sans TC',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:14px;line-height:1.5}
h1{font-size:1.4em;font-weight:700;color:var(--accent);margin-bottom:4px}
h2{font-size:1.1em;font-weight:600;color:var(--text);margin:16px 0 8px;border-bottom:1px solid var(--border);padding-bottom:4px}
h3{font-size:.95em;color:var(--text2);margin:8px 0 4px}

.app{max-width:1200px;margin:0 auto;padding:12px}
.top-bar{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.top-bar h1{margin:0}
.badge{font-size:.75em;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 8px;color:var(--text2);font-family:var(--font-mono)}

/* Upload grid */
.upload-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:12px}
.upload-cell{position:relative;aspect-ratio:1;background:var(--surface);border:2px dashed var(--border);border-radius:8px;cursor:pointer;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:border-color .2s}
.upload-cell:hover{border-color:var(--accent)}
.upload-cell.loaded{border-style:solid;border-color:var(--green)}
.upload-cell img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
.upload-cell .label{font-size:.7em;color:var(--text2);z-index:1;text-align:center;pointer-events:none}
.upload-cell.loaded .label{background:rgba(0,0,0,.6);padding:1px 6px;border-radius:3px;color:#fff;position:absolute;bottom:4px;left:50%;transform:translateX(-50%)}
.upload-cell input{display:none}

/* Main layout */
.main-row{display:grid;grid-template-columns:1fr 300px;gap:12px}
@media(max-width:800px){.main-row{grid-template-columns:1fr}.tuning-panel{order:-1}}

/* Result grid */
.result-section{background:var(--surface);border-radius:8px;padding:12px;border:1px solid var(--border)}
.cube-net{display:grid;gap:2px;justify-content:center;margin:8px 0}
.face-block{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.face-block .cell{width:36px;height:36px;border-radius:4px;cursor:pointer;border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:.65em;color:rgba(0,0,0,.5);font-weight:700;transition:all .15s}
.face-block .cell:hover{transform:scale(1.15);z-index:2}
.face-block .cell.center{border-radius:50%}
.face-block .cell.selected{border-color:#fff;box-shadow:0 0 8px rgba(255,255,255,.4)}
.face-block .cell.low-conf{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 8px var(--accent2)}}

.color-W{background:#f0f0f0}.color-R{background:#d42020}.color-B{background:#2060d0}
.color-O{background:#f08020}.color-G{background:#20a050}.color-Y{background:#e8d020}

/* Stats bar */
.stats-bar{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
.stat{font-family:var(--font-mono);font-size:.8em;padding:2px 8px;border-radius:4px;background:var(--surface2);border:1px solid var(--border)}
.stat.ok{border-color:var(--green);color:var(--green)}
.stat.bad{border-color:var(--red);color:var(--red)}

/* Tuning panel */
.tuning-panel{background:var(--surface);border-radius:8px;padding:12px;border:1px solid var(--border);height:fit-content;position:sticky;top:12px}
.slider-group{margin-bottom:12px}
.slider-row{display:flex;align-items:center;gap:8px;margin:4px 0}
.slider-row label{font-size:.75em;color:var(--text2);min-width:110px;flex-shrink:0}
.slider-row input[type=range]{flex:1;accent-color:var(--accent);height:4px}
.slider-row .val{font-family:var(--font-mono);font-size:.75em;color:var(--accent);min-width:40px;text-align:right}

/* Diagnostic panel */
.diag{background:var(--surface);border-radius:8px;padding:12px;border:1px solid var(--border);margin-top:12px}
.diag-cell{background:var(--surface2);border-radius:6px;padding:8px;margin:4px 0;font-family:var(--font-mono);font-size:.72em;line-height:1.6;border:1px solid var(--border)}
.diag-cell .row{display:flex;gap:8px;flex-wrap:wrap}
.dist-entry{padding:1px 6px;border-radius:3px;background:var(--bg)}
.dist-entry.best{background:var(--accent);color:#000;font-weight:700}
.dist-entry.second{border:1px solid var(--accent2)}

/* Buttons */
.btn{font-family:var(--font-ui);font-size:.85em;padding:6px 16px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;transition:all .15s}
.btn:hover{background:var(--accent);color:#000;border-color:var(--accent)}
.btn.primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.btn.primary:hover{background:#7df}

/* Photo overlay canvas */
.photo-preview{position:relative;display:inline-block;margin:4px}
.photo-preview canvas{border-radius:6px;max-width:100%;display:block}

/* Log */
.log{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px;font-family:var(--font-mono);font-size:.7em;max-height:200px;overflow-y:auto;margin:8px 0;color:var(--text2);white-space:pre-wrap}
.log .warn{color:var(--accent2)}.log .err{color:var(--red)}.log .ok{color:var(--green)}

/* Manual color picker */
.color-picker-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--surface);border:2px solid var(--accent);border-radius:12px;padding:16px;z-index:100;display:none}
.color-picker-popup .colors{display:flex;gap:8px}
.color-picker-popup .cpick{width:40px;height:40px;border-radius:8px;cursor:pointer;border:2px solid transparent}
.color-picker-popup .cpick:hover{border-color:#fff;transform:scale(1.1)}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:99;display:none}

/* Anchor display */
.anchors-row{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
.anchor-chip{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-family:var(--font-mono);font-size:.72em;border:1px solid var(--border);background:var(--surface2)}
.anchor-swatch{width:16px;height:16px;border-radius:3px;border:1px solid rgba(255,255,255,.2)}

.photo-thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:8px 0}
.solve-move{display:inline-block;padding:2px 6px;margin:2px;border-radius:3px;background:var(--surface);border:1px solid var(--border);font-family:var(--font-mono);font-size:.85em}
.solve-move.prime{color:var(--accent2)}.solve-move.double{color:var(--accent)}

/* Camera mode */
#camOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;background:#000;flex-direction:column}
#camOverlay.show{display:flex}
#camVideo{width:100%;flex:1;object-fit:contain;background:#000}
#camCanvas{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;pointer-events:none}
#camUI{position:absolute;bottom:0;left:0;width:100%;padding:12px;display:flex;flex-direction:column;align-items:center;gap:8px;background:linear-gradient(transparent,rgba(0,0,0,.8))}
#camTitle{color:#FFD700;font-size:16px;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.8)}
#camSub{color:rgba(255,255,255,.6);font-size:12px}
#camGrid{display:grid;grid-template-columns:repeat(3,28px);gap:2px}
#camGrid .cg{width:28px;height:28px;border-radius:4px;border:1px solid rgba(255,255,255,.2)}
#camCapBtn{padding:12px 40px;border-radius:30px;background:#FFD700;color:#000;font-size:16px;font-weight:700;border:none;cursor:pointer}
#camCapBtn:active{transform:scale(.95)}
#camDots{display:flex;gap:6px}
#camDots .cd{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.2)}
#camDots .cd.done{background:var(--accent)}
#camDots .cd.now{background:#FFD700;box-shadow:0 0 6px #FFD700}
</style>
</head>
<body>
<div class="app">

<div class="top-bar">
  <h1>🧊 魔方色塊掃描器</h1>
  <span class="badge">11-Stage Pipeline</span>
  <span class="badge" id="statusBadge">等待上傳</span>
</div>

<!-- Upload -->
<div class="upload-grid" id="uploadGrid"></div>

<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
  <button class="btn primary" onclick="runPipeline()" id="scanBtn" disabled>▶ 執行掃描</button>
  <button class="btn" onclick="camStart()" style="background:var(--accent2);color:#000;border-color:var(--accent2)">📸 手機拍照</button>
  <button class="btn" onclick="runSolve()" id="solveBtn" disabled style="background:var(--green);color:#000;border-color:var(--green);font-weight:600">🧮 驗證+求解</button>
  <button class="btn" onclick="exportResult()">💾 匯出 JSON</button>
  <button class="btn" onclick="toggleDiag()">📊 診斷面板</button>
</div>

<div class="main-row">
<div>
  <!-- Result -->
  <div class="result-section" id="resultSection" style="display:none">
    <h2>掃描結果</h2>
    <div class="stats-bar" id="statsBar"></div>
    <div id="cubeNetContainer"></div>
    <h3>動態錨點</h3>
    <div class="anchors-row" id="anchorsRow"></div>
    <div class="log" id="logBox"></div>
    <!-- Solve result -->
    <div id="solveSection" style="display:none;margin-top:12px;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:8px">
      <h3>Facelet 字串</h3>
      <div id="faceletStr" style="font-family:var(--font-mono);font-size:.8em;word-break:break-all;padding:6px;background:var(--surface2);border-radius:4px;margin:4px 0;user-select:all"></div>
      <h3>Stage 10：奇偶性驗證</h3>
      <div id="parityResult" style="font-family:var(--font-mono);font-size:.8em;padding:6px;margin:4px 0"></div>
      <h3>求解結果</h3>
      <div id="solveResult" style="font-family:var(--font-mono);font-size:1em;padding:8px;background:var(--surface2);border-radius:4px;margin:4px 0"></div>
    </div>
  </div>

  <!-- Photo overlays -->
  <div id="photoOverlays" style="display:none">
    <h2>取樣位置預覽</h2>
    <div class="photo-thumbs" id="photoThumbs"></div>
  </div>

  <!-- Diagnostics -->
  <div class="diag" id="diagPanel" style="display:none">
    <h2>格子診斷 <span style="font-size:.8em;color:var(--text2)">(點擊任何色塊展開)</span></h2>
    <div id="diagContent"></div>
  </div>
</div>

<!-- Tuning panel -->
<div class="tuning-panel">
  <h2 style="margin-top:0">⚙️ SCAN_CONFIG</h2>
  <div id="slidersContainer"></div>
  <button class="btn" onclick="exportConfig()" style="width:100%;margin-top:8px">📋 匯出參數 JSON</button>
</div>
</div>

</div>

<!-- Color picker popup -->
<div class="overlay" id="overlay" onclick="closeColorPicker()"></div>
<div class="color-picker-popup" id="colorPicker">
  <h3 style="margin-bottom:8px" id="cpTitle">選擇顏色</h3>
  <div class="colors" id="cpColors"></div>
</div>

function rgb2lab(r, g, b) {

  z=z>0.008856?Math.pow(z,1/3):(7.787*z)+16/116;

function toHSV(r, g, b) {

          Math.round(corners.reduce((s,p)=>s+p[0],0)/4),
          Math.round(corners.reduce((s,p)=>s+p[1],0)/4),
          Math.round(corners.reduce((s,p)=>s+p[2],0)/4)
        ];
        const [ch,cs2,cv]=toHSV(cornerAvg[0],cornerAvg[1],cornerAvg[2]);
        const [cl,ca,cb]=rgb2lab(cornerAvg[0],cornerAvg[1],cornerAvg[2]);
        if(cs2<0.15 && cb<15){
          log(`  → 四角平均有效: RGB(${cornerAvg.join(',')}) S=${cs2.toFixed(3)} b*=${cb.toFixed(1)}`);
          a['W']=cornerAvg;
        } else {
          // Corners are also non-white (scrambled cube!) → scan all 54 cells for whitest
          log(`  → 四角也非白色 (S=${cs2.toFixed(3)} b*=${cb.toFixed(1)})，掃描全部色塊找最白`,'warn');
          let bestWhite=null, bestScore=Infinity;
          FACES.forEach(f=>{
            rawData[f].forEach((rgb,idx)=>{
              if(idx===4) return; // skip centers
              const [hh,ss,vv]=toHSV(rgb[0],rgb[1],rgb[2]);
              const [ll,aa,bb]=rgb2lab(rgb[0],rgb[1],rgb[2]);
              // White = high L, low S, low |b*|
              const score = ss*100 + Math.abs(bb) + (100-ll)*0.5;
              if(score<bestScore && ss<0.1 && Math.abs(bb)<10 && ll>70){
                bestScore=score; bestWhite=rgb;
              }
            });
          });
          if(bestWhite){
            a['W']=bestWhite;
            log(`  → 找到最白色塊: RGB(${bestWhite.join(',')})`, 'ok');
          } else {
            // Ultimate fallback: use a generic high-L low-sat reference
            a['W']=[220,220,220];
            log(`  → 未找到白色塊，使用預設錨點 (220,220,220)`,'warn');
          }
        }
        continue;
      }
    }
    a[color]=centerRGB;
  }
  return a;
}

function isInvalidEdge(c1,c2){
  if(invalidPairs.some(([a,b])=>(c1===a&&c2===b)||(c1===b&&c2===a))) return true;
  if(c1===c2) return true;
  return false;
}

// ===== FACELET STRING + STAGE 10 + SOLVE =====
function exportFaceletString() {
  // Kociemba order: U → R → F → D → L → B
  const KOCIEMBA_ORDER = ['U','R','F','D','L','B'];
  let fl = '';
  for (const face of KOCIEMBA_ORDER) {
    for (let i = 0; i < 9; i++) {
      const colorCode = faceColors[face][i]; // e.g. 'W'
      fl += (C2F[colorCode] || '?');          // e.g. 'U'
    }
  }
  return fl;
}

function validateCubeParity(faceletStr) {
  try {
    const cube = Cube.fromString(faceletStr);
    const json = cube.toJSON();
    
    // Check 0: Permutations must be VALID (no duplicates)
    function isValidPerm(arr, n) {
      const seen = new Set(arr);
      if(seen.size !== n) return false;
      for(const v of arr) if(v < 0 || v >= n) return false;
      return true;
    }
    const epValid = isValidPerm(json.ep, 12);
    const cpValid = isValidPerm(json.cp, 8);
    
    // Check 1: Edge orientation sum mod 2 = 0
    const eoParity = json.eo.reduce((a,b) => a+b, 0) % 2;
    // Check 2: Corner orientation sum mod 3 = 0
    const coParity = json.co.reduce((a,b) => a+b, 0) % 3;
    // Check 3: Permutation parity must match
    function getPermParity(arr) {
      const n=arr.length, visited=new Array(n).fill(false);
      let parity=0;
      for(let i=0;i<n;i++){
        if(!visited[i]){
          let j=i, len=0;
          while(!visited[j]){visited[j]=true;j=arr[j];len++;}
          if(len>1) parity+=(len-1);
        }
      }
      return parity%2;
    }
    const epParity = epValid ? getPermParity(json.ep) : -1;
    const cpParity = cpValid ? getPermParity(json.cp) : -1;
    
    const valid = epValid && cpValid && eoParity===0 && coParity===0 && epParity===cpParity;
    
    return {
      valid, epValid, cpValid,
      eo: json.eo, co: json.co, ep: json.ep, cp: json.cp,
      eoSum: json.eo.reduce((a,b)=>a+b,0),
      coSum: json.co.reduce((a,b)=>a+b,0),
      epParity, cpParity, eoParity, coParity: coParity
    };
  } catch(e) {
    return { valid:false, error: e.message };
  }
}

function tryAutoFix(faceletStr) {
  // Stage 11: Brute force swap search
  const arr = faceletStr.split('');
  function isValidPerm(a,n){const s=new Set(a);if(s.size!==n)return false;for(const v of a)if(v<0||v>=n)return false;return true;}
  function pp(a){const n=a.length,v=new Array(n).fill(false);let p=0;for(let i=0;i<n;i++){if(!v[i]){let j=i,l=0;while(!v[j]){v[j]=true;j=a[j];l++;}if(l>1)p+=(l-1);}}return p%2;}
  for(let i=0;i<54;i++){
    if(i%9===4) continue; // skip centers
    for(let j=i+1;j<54;j++){
      if(j%9===4) continue;
      if(arr[i]===arr[j]) continue;
      // Swap
      [arr[i],arr[j]]=[arr[j],arr[i]];
      const test=arr.join('');
      // Check count
      const cnt={};
      for(const ch of test) cnt[ch]=(cnt[ch]||0)+1;
      if(!Object.values(cnt).every(v=>v===9)){
        [arr[i],arr[j]]=[arr[j],arr[i]]; continue;
      }
      // Check full validity (parity + permutation)
      try {
        const c=Cube.fromString(test);
        const js=c.toJSON();
        // Must be valid permutations (no duplicates)
        if(!isValidPerm(js.ep,12)||!isValidPerm(js.cp,8)){
          [arr[i],arr[j]]=[arr[j],arr[i]]; continue;
        }
        const eo=js.eo.reduce((a,b)=>a+b,0)%2;
        const co=js.co.reduce((a,b)=>a+b,0)%3;
        if(eo===0 && co===0 && pp(js.ep)===pp(js.cp)){
          return {fixed:true, str:test, swap:[i,j]};
        }
      }catch(e){}
      [arr[i],arr[j]]=[arr[j],arr[i]];
    }
  }
  return {fixed:false};
}

let solverReady = false;
function ensureSolver() {
  if(!solverReady) {
    Cube.initSolver();
    solverReady = true;
  }
}

function runSolve() {
  if(!Object.keys(faceColors).length) return;
  
  const section = document.getElementById('solveSection');
  section.style.display = 'block';
  
  // 1. Generate facelet string
  const fl = exportFaceletString();
  const flDisplay = document.getElementById('faceletStr');
  // Color-code each character
  const faceColorMap = {U:'var(--white)',R:'#4488ff',F:'#ee3333',D:'#eecc20',L:'#33aa55',B:'#ff8833'};
  flDisplay.innerHTML = fl.split('').map((ch,i) => {
    const sep = (i>0 && i%9===0) ? '<span style="color:var(--text2)">|</span>' : '';
    return sep + `<span style="color:${faceColorMap[ch]||'var(--text)'}">${ch}</span>`;
  }).join('');
  
  // 2. Validate parity (Stage 10)
  const parityDiv = document.getElementById('parityResult');
  const parity = validateCubeParity(fl);
  
  if(parity.error) {
    parityDiv.innerHTML = `<span style="color:var(--red)">❌ Cube.js 解析失敗: ${parity.error}</span>`;
    document.getElementById('solveResult').innerHTML = '<span style="color:var(--text2)">無法求解（奇偶性未通過）</span>';
    return;
  }
  
  parityDiv.innerHTML = `
    EP 排列合法: ${parity.epValid?'✅':'❌ (有重複cubie!)'} | CP 排列合法: ${parity.cpValid?'✅':'❌ (有重複cubie!)'}<br>
    EO (邊朝向): [${parity.eo.join(',')}] sum%2 = ${parity.eoSum%2} ${parity.eoSum%2===0?'✅':'❌'}<br>
    CO (角朝向): [${parity.co.join(',')}] sum%3 = ${parity.coSum%3} ${parity.coSum%3===0?'✅':'❌'}<br>
    EP parity = ${parity.epParity} | CP parity = ${parity.cpParity} ${parity.epParity===parity.cpParity?'✅':'❌'}<br>
    <strong style="color:${parity.valid?'var(--green)':'var(--red)'}">
      ${parity.valid ? '✅ Stage 10 驗證通過！物理上合法的魔方！' : '❌ 物理不可能的魔方狀態'}
    </strong>
  `;
  
  const solveDiv = document.getElementById('solveResult');
  
  if(!parity.valid) {
    // Try auto-fix (Stage 11)
    solveDiv.innerHTML = '<span style="color:var(--accent2)">⏳ Stage 11: 嘗試 Auto-Fix (暴力搜尋交換)...</span>';
    setTimeout(() => {
      const fix = tryAutoFix(fl);
      if(fix.fixed) {
        parityDiv.innerHTML += `<br><span style="color:var(--accent)">🔧 Auto-Fix: 交換位置 [${fix.swap[0]}]↔[${fix.swap[1]}] 後合法</span>`;
        doSolve(fix.str, solveDiv);
      } else {
        solveDiv.innerHTML = '<span style="color:var(--red)">❌ Auto-Fix 失敗，請手動修正色塊後重試</span>';
      }
    }, 50);
    return;
  }
  
  doSolve(fl, solveDiv);
}

function doSolve(faceletStr, resultDiv) {
  resultDiv.innerHTML = '<span style="color:var(--accent)">⏳ 初始化求解器（約3秒）...</span>';
  document.getElementById('solveSection').scrollIntoView({behavior:'smooth'});
  setTimeout(() => {
    try {
      ensureSolver();
      resultDiv.innerHTML = '<span style="color:var(--accent)">⏳ 求解中...</span>';
      setTimeout(() => {
        try {
          // Double-check validity before solve to prevent infinite loop
          const check = validateCubeParity(faceletStr);
          if(!check.valid) {
            resultDiv.innerHTML = `<span style="color:var(--red)">❌ 求解前再驗證失敗 (ep/cp 排列無效)，請手動修正色塊</span>`;
            return;
          }
          const cube = Cube.fromString(faceletStr);
          const solution = cube.solve();
          const moves = solution.trim().split(/\s+/).filter(m=>m);
          resultDiv.innerHTML = `
            <div style="margin-bottom:6px;color:var(--green);font-weight:700">✅ 求解成功！(${moves.length} 步)</div>
            <div>${moves.map(m => {
              let cls = 'solve-move';
              if(m.includes("'")) cls += ' prime';
              if(m.includes('2')) cls += ' double';
              return `<span class="${cls}">${m}</span>`;
            }).join(' ')}</div>
          `;
        } catch(e) {
          resultDiv.innerHTML = `<span style="color:var(--red)">❌ 求解失敗: ${e.message}</span>`;
        }
      }, 100);
    } catch(e) {
      resultDiv.innerHTML = `<span style="color:var(--red)">❌ 初始化失敗: ${e.message}</span>`;
    }
  }, 100);
}

let camVid, camOv, camCtx, camIdx=0;
const CAM_SEQ=[
  {f:'F',name:'前(紅)',guide:'白色朝上，紅色面對鏡頭'},
  {f:'R',name:'右(藍)',guide:'順時針轉90°，藍色面對鏡頭'},
  {f:'B',name:'後(橘)',guide:'再轉90°，橘色面對鏡頭'},
  {f:'L',name:'左(綠)',guide:'再轉90°，綠色面對鏡頭'},
  {f:'U',name:'上(白)',guide:'往前傾，白色面對鏡頭'},
  {f:'D',name:'下(黃)',guide:'往後傾180°，黃色面對鏡頭'},
];

async function camStart(){
  camIdx=0;
  const ov=document.getElementById('camOverlay');
  ov.classList.add('show');
  camVid=document.getElementById('camVideo');
  const cvs=document.getElementById('camCanvas');
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
    camVid.srcObject=s;await camVid.play();
    // Torch
    try{var tr=s.getVideoTracks()[0];if(tr){var caps=tr.getCapabilities();if(caps&&caps.torch)await tr.applyConstraints({advanced:[{torch:true}]});}}catch(e){}
    // Size canvas to match video
    camVid.onloadedmetadata=function(){
      cvs.width=camVid.videoWidth;cvs.height=camVid.videoHeight;
      camCtx=cvs.getContext('2d');
      camDrawGrid();
    };
    if(camVid.videoWidth){cvs.width=camVid.videoWidth;cvs.height=camVid.videoHeight;camCtx=cvs.getContext('2d');camDrawGrid();}
    camUpdateUI();
  }catch(e){alert('相機錯誤: '+e.message);camClose();}
}

function camClose(){
  if(camVid&&camVid.srcObject){camVid.srcObject.getTracks().forEach(t=>t.stop());camVid.srcObject=null;}
  document.getElementById('camOverlay').classList.remove('show');
}

function camDrawGrid(){
  if(!camCtx)return;
  const vw=camVid.videoWidth,vh=camVid.videoHeight;
  camCtx.clearRect(0,0,vw,vh);
  const gs=Math.min(vw,vh)*0.82,cs=gs/3,sx=(vw-gs)/2,sy=(vh-gs)/2;
  // Dark overlay outside grid
  camCtx.fillStyle='rgba(0,0,0,.35)';
  camCtx.fillRect(0,0,vw,sy);camCtx.fillRect(0,sy+gs,vw,vh-sy-gs);
  camCtx.fillRect(0,sy,sx,gs);camCtx.fillRect(sx+gs,sy,vw-sx-gs,gs);
  // Grid lines
  camCtx.strokeStyle='rgba(255,215,0,.4)';camCtx.lineWidth=2;
  for(let i=0;i<=3;i++){
    camCtx.beginPath();camCtx.moveTo(sx+i*cs,sy);camCtx.lineTo(sx+i*cs,sy+gs);camCtx.stroke();
    camCtx.beginPath();camCtx.moveTo(sx,sy+i*cs);camCtx.lineTo(sx+gs,sy+i*cs);camCtx.stroke();
  }
  // Corner brackets
  camCtx.strokeStyle='#FFD700';camCtx.lineWidth=4;
  const m=20;
  [[sx,sy],[sx+gs,sy],[sx,sy+gs],[sx+gs,sy+gs]].forEach(([x,y])=>{
    const dx=x===sx?1:-1,dy=y===sy?1:-1;
    camCtx.beginPath();camCtx.moveTo(x+m*dx,y);camCtx.lineTo(x,y);camCtx.lineTo(x,y+m*dy);camCtx.stroke();
  });
  // Sample dots
  camCtx.fillStyle='rgba(255,255,255,.3)';
  for(let r=0;r<3;r++)for(let c=0;c<3;c++){
    const px=sx+(c+.5)*cs,py=sy+(r+.5)*cs;
    camCtx.beginPath();camCtx.arc(px,py,4,0,Math.PI*2);camCtx.fill();
  }
}

function camUpdateUI(){
  const info=CAM_SEQ[camIdx];
  document.getElementById('camTitle').textContent=info.name;
  document.getElementById('camSub').textContent=info.guide;
  document.getElementById('camDots').innerHTML=CAM_SEQ.map((_,i)=>'<div class="cd'+(i<camIdx?' done':'')+(i===camIdx?' now':'')+'"></div>').join('');
  document.getElementById('camGrid').innerHTML='';
}

function camCapture(){
  if(!camVid||!camVid.videoWidth)return;
  const vw=camVid.videoWidth,vh=camVid.videoHeight;
  const tc=document.createElement('canvas');tc.width=vw;tc.height=vh;
  const tctx=tc.getContext('2d');tctx.drawImage(camVid,0,0,vw,vh);
  const gs=Math.min(vw,vh)*0.82,cs=gs/3,sx=(vw-gs)/2,sy=(vh-gs)/2;
  const half=Math.round(cs*SCAN_CONFIG.sampleRadius);
  let rgbs=[];
  for(let r=0;r<3;r++)for(let c=0;c<3;c++){
    const px=Math.round(sx+(c+.5)*cs),py=Math.round(sy+(r+.5)*cs);
    const ss=half*2+1;
    const d=tctx.getImageData(Math.max(0,px-half),Math.max(0,py-half),ss,ss);
    let pixels=[];for(let i=0;i<d.data.length;i+=4)pixels.push([d.data[i],d.data[i+1],d.data[i+2]]);
    if(pixels.length>8){pixels.sort((a,b)=>(a[0]+a[1]+a[2])-(b[0]+b[1]+b[2]));const trim=Math.floor(pixels.length*SCAN_CONFIG.trimRatio);pixels=pixels.slice(trim,pixels.length-trim);}
    let rr=0,gg=0,bb=0;pixels.forEach(p=>{rr+=p[0];gg+=p[1];bb+=p[2]});
    const n=pixels.length;rgbs.push([Math.round(rr/n),Math.round(gg/n),Math.round(bb/n)]);
  }
  // Store as rawData for this face
  rawData[CAM_SEQ[camIdx].f]=rgbs;
  if(navigator.vibrate)navigator.vibrate(80);
  // Show preview grid
  const grid=document.getElementById('camGrid');
  grid.innerHTML=rgbs.map(([r,g,b],i)=>'<div class="cg" style="background:rgb('+r+','+g+','+b+')">'+(i===4?'⭐':'')+'</div>').join('');
  // Also update the upload cell
  const cell=document.getElementById('uc_'+CAM_SEQ[camIdx].f);
  if(cell){cell.classList.add('loaded');
    // Draw thumbnail
    const thumbUrl=tc.toDataURL('image/jpeg',0.5);
    let imgEl=cell.querySelector('img');
    if(!imgEl){imgEl=document.createElement('img');cell.appendChild(imgEl);}
    imgEl.src=thumbUrl;
    // Store as Image for photo overlay
    const img=new Image();img.src=thumbUrl;images[CAM_SEQ[camIdx].f]=img;
  }
  camIdx++;
  if(camIdx>=CAM_SEQ.length){
    document.getElementById('camTitle').textContent='✅ 6面拍攝完成！';
    document.getElementById('camSub').textContent='';
    document.getElementById('camCapBtn').textContent='🔍 分析顏色';
    document.getElementById('camCapBtn').onclick=function(){camClose();checkReady();runPipeline();};
    document.getElementById('camDots').innerHTML=CAM_SEQ.map(()=>'<div class="cd done"></div>').join('');
  }else{
    camUpdateUI();
    camDrawGrid();
  }
}

init();
</script>

<!-- Camera overlay -->
<div id="camOverlay">
  <div style="position:relative;flex:1;display:flex;align-items:center;justify-content:center">
    <video id="camVideo" playsinline autoplay muted></video>
    <canvas id="camCanvas"></canvas>
  </div>
  <div id="camUI">
    <div id="camDots"></div>
    <div id="camTitle">前(紅)</div>
    <div id="camSub">白色朝上，紅色面對鏡頭</div>
    <div id="camGrid" style="margin:4px 0"></div>
    <button id="camCapBtn" onclick="camCapture()">📸 拍照</button>
    <button onclick="camClose()" style="background:none;border:none;color:rgba(255,255,255,.4);font-size:12px;cursor:pointer;margin-top:4px">✕ 關閉相機</button>
  </div>
</div>
</body>
</html>
